const $ = (id) => document.getElementById(id);
function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// ---------- 内置的极简 Markdown 渲染器(只覆盖 notes.md 用到的语法,不依赖外部库) ----------
function renderInline(s) {
  return escapeHtml(s)
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
}
function renderMarkdown(md) {
  const lines = md.split("\n");
  const out = [];
  let i = 0, para = [];
  const flushPara = () => {
    if (para.length) { out.push("<p>" + renderInline(para.join(" ")) + "</p>"); para = []; }
  };
  while (i < lines.length) {
    const line = lines[i];
    if (line.startsWith("```")) {
      flushPara();
      const code = [];
      i++;
      while (i < lines.length && !lines[i].startsWith("```")) code.push(lines[i++]);
      i++;
      out.push("<pre><code>" + escapeHtml(code.join("\n")) + "</code></pre>");
      continue;
    }
    const h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h) {
      flushPara();
      out.push(`<h${h[1].length}>` + renderInline(h[2]) + `</h${h[1].length}>`);
      i++; continue;
    }
    if (/^\|/.test(line) && /^\|[\s:|-]+\|$/.test(lines[i + 1] || "")) {
      flushPara();
      const cells = (l) => l.split("|").slice(1, -1).map((c) => c.trim());
      let html = "<table><tr>" + cells(line).map((c) => `<th>${renderInline(c)}</th>`).join("") + "</tr>";
      i += 2;
      while (i < lines.length && /^\|/.test(lines[i])) {
        html += "<tr>" + cells(lines[i]).map((c) => `<td>${renderInline(c)}</td>`).join("") + "</tr>";
        i++;
      }
      out.push(html + "</table>");
      continue;
    }
    if (/^[-*]\s+/.test(line)) {
      flushPara();
      let html = "<ul>";
      while (i < lines.length && /^[-*]\s+/.test(lines[i])) {
        html += "<li>" + renderInline(lines[i].replace(/^[-*]\s+/, "")) + "</li>";
        i++;
      }
      out.push(html + "</ul>");
      continue;
    }
    if (line.trim() === "") { flushPara(); i++; continue; }
    para.push(line.trim());
    i++;
  }
  flushPara();
  return out.join("\n");
}

// ---------- Python 语法高亮(自带,不依赖外部库) ----------
const PY_KEYWORDS = new Set([
  "def","class","return","if","elif","else","for","while","import","from","as","in",
  "not","and","or","is","None","True","False","with","try","except","finally","lambda",
  "pass","break","continue","global","nonlocal","yield","raise","assert","del","async","await",
]);
const PY_BUILTINS = new Set([
  "print","len","range","int","float","str","list","dict","set","tuple","sum","min","max",
  "sorted","enumerate","zip","map","filter","abs","round","type","bool","open","isinstance",
  "reversed","any","all","format","input",
]);
const PY_RE = /("""[\s\S]*?"""|'''[\s\S]*?'''|"(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*')|(#[^\n]*)|(\b\d+\.?\d*\b)|(@\w+)|([A-Za-z_]\w*)/g;
function highlightPython(code) {
  let out = "", last = 0, m, prevWord = "";
  while ((m = PY_RE.exec(code)) !== null) {
    out += escapeHtml(code.slice(last, m.index));
    const txt = escapeHtml(m[0]);
    if (m[1]) out += `<span class="tok-str">${txt}</span>`;
    else if (m[2]) out += `<span class="tok-com">${txt}</span>`;
    else if (m[3]) out += `<span class="tok-num">${txt}</span>`;
    else if (m[4]) out += `<span class="tok-dec">${txt}</span>`;
    else if (m[5]) {
      const w = m[5];
      if (PY_KEYWORDS.has(w)) out += `<span class="tok-kw">${txt}</span>`;
      else if (prevWord === "def" || prevWord === "class") out += `<span class="tok-def">${txt}</span>`;
      else if (PY_BUILTINS.has(w)) out += `<span class="tok-bi">${txt}</span>`;
      else out += txt;
      prevWord = w;
    }
    last = m.index + m[0].length;
  }
  out += escapeHtml(code.slice(last));
  return out;
}
function refreshHighlight() {
  $("highlight").innerHTML = highlightPython($("editor").value) + "\n";
  syncScroll();
}
function syncScroll() {
  const ta = $("editor"), hl = $("highlight");
  hl.scrollTop = ta.scrollTop; hl.scrollLeft = ta.scrollLeft;
}
function setEditorValue(v) {
  $("editor").value = v;
  refreshHighlight();
  $("editor").scrollTop = 0;
  syncScroll();
}

// ---------- 答案持久化(整段存浏览器 localStorage,切章节/刷新都不丢) ----------
const ANSWER_PREFIX = "answer:";
function bufKey(dir) { return ANSWER_PREFIX + dir; }
function hasSavedAnswer(dir) { return localStorage.getItem(bufKey(dir)) !== null; }
function loadBuffer(dir) { return localStorage.getItem(bufKey(dir)); }
function saveBuffer() {
  localStorage.setItem(bufKey(currentChapter), $("editor").value);
  localStorage.setItem("lastChapter", currentChapter);
}
function debounce(fn, ms) { let t; return () => { clearTimeout(t); t = setTimeout(fn, ms); }; }
const debouncedSave = debounce(saveBuffer, 400);

  localStorage.setItem("theme", theme);
}

const SOLVED_PREFIX = "solved:";
const TOTAL_PREFIX = "total:";
function solvedSet(dir) {
  try { return new Set(JSON.parse(localStorage.getItem(SOLVED_PREFIX + dir) || "[]")); }
  catch (e) { return new Set(); }
}
function saveSolved(dir, set) { localStorage.setItem(SOLVED_PREFIX + dir, JSON.stringify([...set])); }
function chapterTotal(dir) { return parseInt(localStorage.getItem(TOTAL_PREFIX + dir) || "0", 10); }
function setChapterTotal(dir, n) { localStorage.setItem(TOTAL_PREFIX + dir, String(n)); }

// 把运行输出解析成 {题名: 是否通过}
function parseResults(text) {
  const res = {};
  let cur = null;
  for (const ln of text.split("\n")) {
    const m = ln.match(/^\[(.+)\]$/);
    if (m) { cur = m[1]; continue; }
    if (cur && /^结果: Pass!/.test(ln)) { res[cur] = true; cur = null; }
    else if (cur && /^结果: Failed\./.test(ln)) { res[cur] = false; cur = null; }
  }
  return res;
}
function updateStarDisplay() {
  const total = chapterTotal(currentChapter), have = solvedSet(currentChapter).size;
  const el = $("star-count");
  if (NO_EXERCISE.has(currentChapter)) el.textContent = "⭐ 自由练习";
  else if (total > 0) el.textContent = (have >= total ? "🏆 " : "⭐ ") + have + "/" + total;
  else el.textContent = "⭐ " + have;
}
function refreshSidebarProgress() {
  document.querySelectorAll(".ch-prog").forEach((el) => {
    const dir = el.dataset.dir;
    if (NO_EXERCISE.has(dir)) { el.textContent = ""; return; }
    const total = chapterTotal(dir), have = solvedSet(dir).size;
    if (total > 0) el.textContent = have >= total ? "🏆" : `${have}/${total}`;
    else el.textContent = have > 0 ? `⭐${have}` : "";
  });
}

function starBurst(n) {
  const rect = $("output").getBoundingClientRect();
  const cx = rect.left + rect.width / 2, cy = rect.top + 40;
  for (let i = 0; i < Math.min(n, 40); i++) {
    const el = document.createElement("div");
    el.className = "star-fx"; el.textContent = "⭐";
    document.body.appendChild(el);
    const dx = (Math.random() - 0.5) * 360;
    const peak = -(90 + Math.random() * 190);
    const rot = (Math.random() - 0.5) * 540;
    const dur = 800 + Math.random() * 600;
    el.animate([
      { transform: `translate(${cx}px, ${cy}px) scale(.5)`, opacity: 1 },
      { transform: `translate(${cx + dx * .6}px, ${cy + peak}px) scale(1.25) rotate(${rot * .5}deg)`, opacity: 1, offset: .45 },
      { transform: `translate(${cx + dx}px, ${cy + 180}px) scale(.8) rotate(${rot}deg)`, opacity: 0 },
    ], { duration: dur, easing: "cubic-bezier(.2,.7,.4,1)", delay: i * 25 }).onfinish = () => el.remove();
  }
}
function chime(times) {
  try {
    chime.ctx = chime.ctx || new (window.AudioContext || window.webkitAudioContext)();
    const ctx = chime.ctx;
    for (let i = 0; i < Math.min(times, 6); i++) {
      const t = ctx.currentTime + i * 0.1;
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = "square";
      o.frequency.setValueAtTime(988, t);
      o.frequency.setValueAtTime(1319, t + 0.07);
      g.gain.setValueAtTime(0.08, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      o.connect(g).connect(ctx.destination); o.start(t); o.stop(t + 0.32);
    }
  } catch (e) { /* 静默 */ }
}

let replReady = false;
const PYODIDE_CDN = "https://cdn.jsdelivr.net/pyodide/v0.26.4/full/";
const PYODIDE_LOCAL = "vendor/pyodide/";   // 本地离线包(用 tools/prepare_offline.py 下载)

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = src;
    s.onload = resolve;
    s.onerror = () => reject(new Error("加载失败: " + src));
    document.head.appendChild(s);
  });
}
// 优先本地离线包,没有就退回 CDN;返回该用的 indexURL
async function ensurePyodideScript() {
  try {
    await loadScript(PYODIDE_LOCAL + "pyodide.js");
    $("status").textContent = "已找到本地离线包,正在初始化...";
    return PYODIDE_LOCAL;
  } catch (e) {
    $("status").textContent = "未找到本地离线包,改从网络加载 Pyodide...";
    await loadScript(PYODIDE_CDN + "pyodide.js");
    return PYODIDE_CDN;
  }
}

async function initPyodide() {
  const indexURL = await ensurePyodideScript();
  if (typeof loadPyodide === "undefined") {
    throw new Error("Pyodide 脚本未能加载(本地和 CDN 都失败)。可运行 tools/prepare_offline.py 准备离线包。");
  }
  pyodide = await loadPyodide({ indexURL });
  $("status").textContent = "正在加载 numpy / pandas ...";
  await pyodide.loadPackage(["numpy", "pandas"]);

  const HOME = "/home/pyodide";
  pyodide.FS.mkdirTree(HOME + "/data");
  for (const name of ["customers.csv", "products.csv", "orders.csv"]) {
    try {
      const resp = await fetch(`../data/${name}`);
      if (resp.ok) pyodide.FS.writeFile(`${HOME}/data/${name}`, await resp.text());
    } catch (e) { /* 忽略 */ }
  }
  try {
    const resp = await fetch("../_check_utils.py");
    if (resp.ok) pyodide.FS.writeFile(`${HOME}/_check_utils.py`, await resp.text());
  } catch (e) { /* ignore */ }

  pyodide.runPython("import os, sys\nos.chdir('/home/pyodide')\n" +
    "if '/home/pyodide' not in sys.path: sys.path.insert(0, '/home/pyodide')");
  pyodide.globals.set("__file__", "/home/pyodide/exercises.py");

  // 交互框(REPL)的执行器: 单独的命名空间,像真正的 >>> 一样返回表达式的值
  pyodide.runPython([
    "import sys as _sys, io as _io, traceback as _tb",
    "_REPL_NS = {}",
    "exec('import numpy as np\\nimport pandas as pd', _REPL_NS)",
    "def _repl_run(src):",
    "    _out = _io.StringIO(); _old = _sys.stdout; _sys.stdout = _out; _rep = None",
    "    try:",
    "        try:",
    "            _val = eval(compile(src, '<repl>', 'eval'), _REPL_NS)",
    "            if _val is not None: _rep = repr(_val)",
    "        except SyntaxError:",
    "            exec(compile(src, '<repl>', 'exec'), _REPL_NS)",
    "    except Exception:",
    "        _out.write(_tb.format_exc())",
    "    finally:",
    "        _sys.stdout = _old",
    "    return [_out.getvalue(), _rep]",
  ].join("\n"));

  pyodide.setStdout({ batched: (line) => appendOutput(line) });
  pyodide.setStderr({ batched: (line) => appendOutput(line, "err") });

  replReady = true;
  $("repl-input").disabled = false;
  $("repl-input").placeholder = "在这里敲一行 Python,回车运行…";
  $("run-btn").disabled = false;
  $("status").textContent = "环境就绪 ✓ (Ctrl+Enter 运行)";
}

async function runCode() {
  if (!pyodide) return;
  saveBuffer();
  $("output").textContent = "";
  $("run-btn").disabled = true;
  $("status").textContent = "运行中...";
  seriaSay("run");
  let hadError = false;
  try {
    pyodide.runPython(
      'import sys\nif "_check_utils" in sys.modules:\n' +
      '    sys.modules["_check_utils"]._total = 0\n    sys.modules["_check_utils"]._passed = 0\n'
    );
    await pyodide.runPythonAsync($("editor").value);
    appendOutput("\n--- 运行完成 ---");
  } catch (e) {
    hadError = true;
    appendOutput(String(e), "err");
  } finally {
    $("run-btn").disabled = false;
    $("status").textContent = "环境就绪 ✓ (Ctrl+Enter 运行)";
  }

  // ---------- 星星进度: 只有第一次做对才点亮 ----------
  const text = $("output").textContent;
  const results = parseResults(text);
  const names = Object.keys(results);

  if (names.length === 0) {
    // 没有判分输出(比如示例代码或入门章)
    if (hadError) seriaSay("error");
    else if (NO_EXERCISE.has(currentChapter)) seriaSay("intro");
    else seriaSay("plain");
    return;
  }

  setChapterTotal(currentChapter, names.length);
  const solved = solvedSet(currentChapter);
  let newStars = 0;
  for (const n of names) {
    if (results[n] && !solved.has(n)) { solved.add(n); newStars++; }
  }
  saveSolved(currentChapter, solved);
  updateStarDisplay();
  refreshSidebarProgress();

  const total = names.length, have = solved.size;
  const passNow = names.filter((n) => results[n]).length;

  if (newStars > 0) {
    starBurst(newStars * 5);
    chime(newStars);
    if (have >= total) seriaSay("chapterClear");
    else seriaSay("newStar", { s: newStars, have, total, left: total - have });
  } else if (hadError) {
    seriaSay("error");
  } else if (passNow === total) {
    seriaSay("allPassAgain");
  } else if (passNow > 0) {
    seriaSay("somePass", { p: passNow });
  } else {
    seriaSay("allFail");
  }
}

// ---------- 交互框(REPL) ----------
const replHistory = [];
let replHistIdx = 0;
function replPrint(text, cls) {
  const log = $("repl-log");
  const span = document.createElement("span");
  if (cls) span.className = cls;
  span.textContent = text + "\n";
  log.appendChild(span);
  log.scrollTop = log.scrollHeight;
}
async function replRun(src) {
  if (!src.trim()) return;
  replPrint(">>> " + src, "repl-echo");
  if (!replReady) { replPrint("环境还在加载,请稍候…", "repl-err"); return; }
  try {
    pyodide.globals.set("_repl_src", src);
    const proxy = pyodide.runPython("_repl_run(_repl_src)");
    const arr = proxy.toJs();
    proxy.destroy();
    const out = arr[0], rep = arr[1];
    if (out) replPrint(out.replace(/\n$/, ""));
    if (rep !== undefined && rep !== null) replPrint(rep, "repl-val");
  } catch (e) {
    replPrint(String(e), "repl-err");
  }
}

function collectAnswers() {
  const out = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(ANSWER_PREFIX)) out[k.slice(ANSWER_PREFIX.length)] = localStorage.getItem(k);
  }

}
$("export-btn").onclick = () => {
  const answers = collectAnswers();
  if (Object.keys(answers).length === 0) {
    $("bubble").textContent = "现在还没有可导出的答案,先去写点代码吧!";
    return;
  }
  const data = { type: "py-learning-answers", version: 1, answers };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "answers-backup.json";
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  $("bubble").textContent = "答案已导出!换电脑时用「⬆ 导入答案」读回来就行。";
};
$("import-btn").onclick = () => $("import-file").click();
$("import-file").onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      const answers = parsed && parsed.answers ? parsed.answers : parsed;
      if (!answers || typeof answers !== "object") throw new Error("格式不对");
      if (!confirm("导入会覆盖你当前浏览器里已保存的答案,确定吗?")) return;
      Object.keys(answers).forEach((dir) => {
        if (typeof answers[dir] === "string") localStorage.setItem(ANSWER_PREFIX + dir, answers[dir]);

      const saved = loadBuffer(currentChapter);
      if (saved != null) setEditorValue(saved);
      $("bubble").textContent = "答案已导入!继续加油,勇士!";

  if (e.key === "Enter") {
    e.preventDefault();
    const v = e.target.value;
    if (v.trim()) { replHistory.push(v); replHistIdx = replHistory.length; }
    e.target.value = "";
    replRun(v);
  } else if (e.key === "ArrowUp") {
    if (replHistIdx > 0) { replHistIdx--; e.target.value = replHistory[replHistIdx]; e.preventDefault(); }
  } else if (e.key === "ArrowDown") {
    if (replHistIdx < replHistory.length - 1) { replHistIdx++; e.target.value = replHistory[replHistIdx]; }
    else { replHistIdx = replHistory.length; e.target.value = ""; }
    e.preventDefault();
  }
});

applyNotesCollapsed(localStorage.getItem("notesCollapsed") === "1");
buildSidebar();
refreshSidebarProgress();
const lastChapter = localStorage.getItem("lastChapter");
const startDir = CHAPTERS.some((c) => c.dir === lastChapter) ? lastChapter : CHAPTERS[0].dir;
selectChapter(startDir);
seriaSay("greet");
initPyodide().catch((e) => { $("status").textContent = "环境加载失败: " + e; });
