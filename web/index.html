const $ = (id) => document.getElementById(id);
function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// ---------- 内置的极简 Markdown 渲染器(只覆盖 notes.md 用到的语法,不依赖外部库) ----------
function renderInline(s) {
  return escapeHtml(s)
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
}
function renderMarkdown(md) {
  const lines = md.split("\n");
  const out = [];
  let i = 0, para = [];
  const flushPara = () => {
    if (para.length) { out.push("<p>" + renderInline(para.join(" ")) + "</p>"); para = []; }
  };
  while (i < lines.length) {
    const line = lines[i];
    if (line.startsWith("```")) {                     // 代码块
      flushPara();
      const code = [];
      i++;
      while (i < lines.length && !lines[i].startsWith("```")) code.push(lines[i++]);
      i++;
      out.push("<pre><code>" + escapeHtml(code.join("\n")) + "</code></pre>");
      continue;
    }
    const h = line.match(/^(#{1,6})\s+(.*)$/);        // 标题
    if (h) {
      flushPara();
      out.push(`<h${h[1].length}>` + renderInline(h[2]) + `</h${h[1].length}>`);
      i++; continue;
    }
    if (/^\|/.test(line) && /^\|[\s:|-]+\|$/.test(lines[i + 1] || "")) {  // 表格
      flushPara();
      const cells = (l) => l.split("|").slice(1, -1).map((c) => c.trim());
      let html = "<table><tr>" + cells(line).map((c) => `<th>${renderInline(c)}</th>`).join("") + "</tr>";
      i += 2;
      while (i < lines.length && /^\|/.test(lines[i])) {
        html += "<tr>" + cells(lines[i]).map((c) => `<td>${renderInline(c)}</td>`).join("") + "</tr>";
        i++;
      }
      out.push(html + "</table>");
      continue;
    }
    if (/^[-*]\s+/.test(line)) {                      // 无序列表
      flushPara();
      let html = "<ul>";
      while (i < lines.length && /^[-*]\s+/.test(lines[i])) {
        html += "<li>" + renderInline(lines[i].replace(/^[-*]\s+/, "")) + "</li>";
        i++;
      }
      out.push(html + "</ul>");
      continue;
    }
    if (line.trim() === "") { flushPara(); i++; continue; }
    para.push(line.trim());
    i++;
  }
  flushPara();
  return out.join("\n");
}

// ---------- Python 语法高亮(自带,不依赖外部库) ----------
const PY_KEYWORDS = new Set([
  "def","class","return","if","elif","else","for","while","import","from","as","in",
  "not","and","or","is","None","True","False","with","try","except","finally","lambda",
  "pass","break","continue","global","nonlocal","yield","raise","assert","del","async","await",
]);
const PY_BUILTINS = new Set([
  "print","len","range","int","float","str","list","dict","set","tuple","sum","min","max",
  "sorted","enumerate","zip","map","filter","abs","round","type","bool","open","isinstance",
  "reversed","any","all","format","input",
]);
// 一次扫描: 字符串/注释优先,然后数字、装饰器、标识符(关键字/内置/def后函数名)
const PY_RE = /("""[\s\S]*?"""|'''[\s\S]*?'''|"(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*')|(#[^\n]*)|(\b\d+\.?\d*\b)|(@\w+)|([A-Za-z_]\w*)/g;
function highlightPython(code) {
  let out = "", last = 0, m, prevWord = "";
  while ((m = PY_RE.exec(code)) !== null) {
    out += escapeHtml(code.slice(last, m.index));
    const txt = escapeHtml(m[0]);
    if (m[1]) out += `<span class="tok-str">${txt}</span>`;
    else if (m[2]) out += `<span class="tok-com">${txt}</span>`;
    else if (m[3]) out += `<span class="tok-num">${txt}</span>`;
    else if (m[4]) out += `<span class="tok-dec">${txt}</span>`;
    else if (m[5]) {
      const w = m[5];
      if (PY_KEYWORDS.has(w)) out += `<span class="tok-kw">${txt}</span>`;
      else if (prevWord === "def" || prevWord === "class") out += `<span class="tok-def">${txt}</span>`;
      else if (PY_BUILTINS.has(w)) out += `<span class="tok-bi">${txt}</span>`;
      else out += txt;
      prevWord = w;
    }
    last = m.index + m[0].length;
  }
  out += escapeHtml(code.slice(last));
  return out;
}
function refreshHighlight() {
  const code = $("editor").value;
  // 高亮 HTML 直接写进 <pre>(不再套 <code>,避免浏览器 monospace 字号怪癖导致错位)
  // 末尾补一个换行,保证最后一行的高亮层和 textarea 一样高
  $("highlight").innerHTML = highlightPython(code) + "\n";
  syncScroll();
}
function syncScroll() {
  const ta = $("editor"), hl = $("highlight");
  hl.scrollTop = ta.scrollTop;
  hl.scrollLeft = ta.scrollLeft;
}
function setEditorValue(v) {
  $("editor").value = v;
  refreshHighlight();
  $("editor").scrollTop = 0;
  syncScroll();
}

  let t;

function coinBurst(n) {
  const rect = $("output").getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + 40;
  for (let i = 0; i < Math.min(n, 40); i++) {
    const el = document.createElement("div");
    el.className = "coin";
    el.textContent = "🪙";
    document.body.appendChild(el);
    const dx = (Math.random() - 0.5) * 360;
    const peak = -(90 + Math.random() * 190);
    const rot = (Math.random() - 0.5) * 540;
    const dur = 800 + Math.random() * 600;
    el.animate([
      { transform: `translate(${cx}px, ${cy}px) scale(.5)`, opacity: 1 },
      { transform: `translate(${cx + dx * .6}px, ${cy + peak}px) scale(1.25) rotate(${rot * .5}deg)`,
        opacity: 1, offset: .45 },
      { transform: `translate(${cx + dx}px, ${cy + 180}px) scale(.8) rotate(${rot}deg)`, opacity: 0 },
    ], { duration: dur, easing: "cubic-bezier(.2,.7,.4,1)", delay: i * 25 })
      .onfinish = () => el.remove();
  }
}

function coinSound(times) {
  try {
    coinSound.ctx = coinSound.ctx || new (window.AudioContext || window.webkitAudioContext)();
    const ctx = coinSound.ctx;
    for (let i = 0; i < Math.min(times, 6); i++) {
      const t = ctx.currentTime + i * 0.1;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = "square";
      o.frequency.setValueAtTime(988, t);          // B5
      o.frequency.setValueAtTime(1319, t + 0.07);  // E6 —— 经典"金币"两连音
      g.gain.setValueAtTime(0.08, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      o.connect(g).connect(ctx.destination);
      o.start(t);
      o.stop(t + 0.32);
    }
  } catch (e) { /* 浏览器不允许自动播放时静默跳过 */ }
}

const SERIA = {
  greet: [
    "欢迎回来,勇士!今天也一起攻略 pandas 吧!",
    "勇士,准备好了吗?左边是秘籍,右边是修炼场!",
    "又见面了,勇士!点『载入本章练习』开始今天的冒险吧!",
  ],
  run: ["看你的了,勇士!", "深呼吸——运行!", "赛利亚在旁边看着呢,加油!"],
  allPass: [
    "全部通过!勇士,你就是传说中的数据分析师!",
    "太漂亮了!这波操作赛利亚给满分!",
    "完美通关!金币全部拿走,不用客气!",
  ],
  somePass: [
    "已经对了 {p} 题了,剩下的也没问题的!",
    "离全部通过只差一点点,看看 Failed 那题的预期和实际!",
    "又进步了!翻翻左边的笔记,下一题也能拿下!",
  ],
  allFail: [
    "别灰心,勇士!左边的笔记里藏着答案哦!",
    "万事开头难,赛利亚相信你!",
  ],
  error: [
    "呀,代码报错了……看看红色的提示,勇士你可以的!",
    "别怕报错,报错信息就是线索!从最后一行读起!",
  ],
  plain: ["运行完成!想做题的话,点『载入本章练习』,做对有金币哦!"],
};
function seriaSay(kind, ctx = {}) {
  const pool = SERIA[kind] || SERIA.greet;
  let line = pool[Math.floor(Math.random() * pool.length)];
  line = line.replace("{p}", ctx.p ?? "");
  $("bubble").textContent = line;
  if (kind === "allPass" || kind === "somePass") {
    const m = $("mascot");
    m.classList.remove("celebrate");
    void m.offsetWidth;   // 重新触发动画
    m.classList.add("celebrate");
  }
}

// ---------- 章节切换 ----------
function buildSidebar() {
  const list = $("chapter-list");
  CHAPTERS.forEach((ch) => {
    const btn = document.createElement("button");
    btn.textContent = ch.title;
    btn.dataset.dir = ch.dir;
    btn.onclick = () => selectChapter(ch.dir);
    list.appendChild(btn);
  });
}

async function selectChapter(dir) {
  currentChapter = dir;
  localStorage.setItem("lastChapter", dir);
  document.querySelectorAll("#chapter-list button").forEach((b) =>
    b.classList.toggle("active", b.dataset.dir === dir));
  // 有存档就恢复上次写的内容,没有就载入示例模板
  const saved = loadBuffer(dir);
  setEditorValue(saved != null ? saved : (STARTER[dir] || ""));
  $("notes").innerHTML = "加载笔记中...";
  try {
    const resp = await fetch(`../${dir}/notes.md`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    $("notes").innerHTML = renderMarkdown(await resp.text());
    $("notes").scrollTop = 0;
  } catch (e) {
    $("notes").innerHTML = `<p>笔记加载失败: ${e}。请确认是通过
      <code>python -m http.server</code> 在项目根目录启动后访问的。</p>`;
  }
}

// ---------- 输出 ----------
function appendOutput(text, cls) {
  const out = $("output");
  const span = document.createElement("span");
  if (cls) span.className = cls;
  // 给校验结果加个颜色
  if (!cls && /^结果: Pass!/.test(text)) span.className = "pass";
  if (!cls && /^结果: Failed\./.test(text)) span.className = "fail";
  span.textContent = text + "\n";
  out.appendChild(span);
  out.scrollTop = out.scrollHeight;
}

// ---------- Pyodide ----------
async function initPyodide() {
  if (typeof loadPyodide === "undefined") {
    throw new Error("Pyodide 脚本未能从 CDN 加载,请检查网络后刷新页面(笔记阅读不受影响)");
  }
  pyodide = await loadPyodide();
  $("status").textContent = "正在加载 numpy / pandas ...";
  await pyodide.loadPackage(["numpy", "pandas"]);

  // 用绝对路径把文件写进 Python 的工作目录 /home/pyodide,
  // 保证 pd.read_csv("data/xxx.csv") 和命令行一致(否则相对写路径会落到别处,读不到)
  const HOME = "/home/pyodide";
  pyodide.FS.mkdirTree(HOME + "/data");
  for (const name of ["customers.csv", "products.csv", "orders.csv"]) {
    try {
      const resp = await fetch(`../data/${name}`);
      if (resp.ok) pyodide.FS.writeFile(`${HOME}/data/${name}`, await resp.text());
    } catch (e) { /* 数据没生成时忽略,页面里会提示 */ }
  }

  // 把校验工具也放进去,这样章节的 exercises.py 可以直接在网页里运行
  try {
    const resp = await fetch("../_check_utils.py");
    if (resp.ok) pyodide.FS.writeFile(`${HOME}/_check_utils.py`, await resp.text());
  } catch (e) { /* ignore */ }

  // 固定工作目录到 /home/pyodide,并把它加进 sys.path:
  //  - STARTER 示例直接 pd.read_csv("data/...") 靠 cwd 命中数据
  //  - 练习的 from _check_utils import ... 能在这里找到校验工具
  pyodide.runPython("import os, sys\nos.chdir('/home/pyodide')\n" +
    "if '/home/pyodide' not in sys.path: sys.path.insert(0, '/home/pyodide')");
  // exercises.py 里用到了 __file__,浏览器环境里预先定义好
  pyodide.globals.set("__file__", "/home/pyodide/exercises.py");

  pyodide.setStdout({ batched: (line) => appendOutput(line) });
  pyodide.setStderr({ batched: (line) => appendOutput(line, "err") });

  $("run-btn").disabled = false;
  $("status").textContent = "环境就绪 ✓ (Ctrl+Enter 运行)";
}

async function runCode() {
  if (!pyodide) return;
  saveBuffer();   // 点运行即存一次答案
  $("output").textContent = "";
  $("run-btn").disabled = true;
  $("status").textContent = "运行中...";
  seriaSay("run");
  let hadError = false;
  try {
    // 每次运行前重置校验计数,避免多次运行累加
    pyodide.runPython(
      'import sys\n' +
      'if "_check_utils" in sys.modules:\n' +
      '    sys.modules["_check_utils"]._total = 0\n' +
      '    sys.modules["_check_utils"]._passed = 0\n'
    );
    await pyodide.runPythonAsync($("editor").value);
    appendOutput("\n--- 运行完成 ---");
  } catch (e) {
    hadError = true;
    appendOutput(String(e), "err");
  } finally {
    $("run-btn").disabled = false;
    $("status").textContent = "环境就绪 ✓ (Ctrl+Enter 运行)";
  }

  // ---------- 正反馈: 数一数这次运行通过了几题 ----------
  const text = $("output").textContent;
  const pass = (text.match(/结果: Pass!/g) || []).length;
  const fail = (text.match(/结果: Failed\./g) || []).length;
  if (pass > 0) {
    coins += pass;
    updateCoinCount();
    coinBurst(pass * 4);
    coinSound(pass);
  }
  if (hadError) seriaSay("error");
  else if (pass > 0 && fail === 0) seriaSay("allPass");
  else if (pass > 0) seriaSay("somePass", { p: pass });
  else if (fail > 0) seriaSay("allFail");
  else seriaSay("plain");
}

// ---------- 事件 ----------
$("run-btn").onclick = runCode;
$("reset-btn").onclick = () => {
  if (hasSavedAnswer(currentChapter) &&
      !confirm("这会用「示例代码」覆盖你在本章写的内容,确定吗?")) return;
  setEditorValue(STARTER[currentChapter] || "");
  saveBuffer();
};
$("theme-btn").onclick = () =>
  applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
$("exercise-btn").onclick = async () => {
  if (hasSavedAnswer(currentChapter) &&
      !confirm("这会用「练习模板」覆盖你在本章写的内容,确定吗?")) return;
  try {
    const resp = await fetch(`../${currentChapter}/exercises.py`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    setEditorValue(await resp.text());
    saveBuffer();
    seriaSay("greet");
    $("bubble").textContent = "练习已载入!把 TODO 补全后点运行,做对一题掉一枚金币哦!";
  } catch (e) {
    $("bubble").textContent = "练习加载失败了……确认服务器是在项目根目录启动的吗?";
  }
};

// ---------- 导出 / 导入答案 ----------
function collectAnswers() {
  const out = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(ANSWER_PREFIX)) out[k.slice(ANSWER_PREFIX.length)] = localStorage.getItem(k);
  }
  return out;
}
$("export-btn").onclick = () => {
  const answers = collectAnswers();
  if (Object.keys(answers).length === 0) {
    $("bubble").textContent = "现在还没有可导出的答案,先去写点代码吧!";
    return;
  }
  const data = { type: "py-learning-answers", version: 1, answers };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "answers-backup.json";
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  $("bubble").textContent = "答案已导出!换电脑时用「⬆ 导入答案」读回来就行。";
};
$("import-btn").onclick = () => $("import-file").click();
$("import-file").onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      // 容错: 既支持 {type,answers:{...}} 也支持直接 {dir: code}
      const answers = parsed && parsed.answers ? parsed.answers : parsed;
      if (!answers || typeof answers !== "object") throw new Error("格式不对");
      if (!confirm("导入会覆盖你当前浏览器里已保存的答案,确定吗?")) return;
      Object.keys(answers).forEach((dir) => {
        if (typeof answers[dir] === "string") localStorage.setItem(ANSWER_PREFIX + dir, answers[dir]);
      });
      const saved = loadBuffer(currentChapter);   // 刷新当前章节显示
      if (saved != null) setEditorValue(saved);
      $("bubble").textContent = "答案已导入!继续加油,勇士!";
    } catch (err) {
      $("bubble").textContent = "导入失败:这个文件不是有效的答案 JSON。";
    } finally {
      e.target.value = "";   // 允许再次选同一个文件
    }
  };
  reader.readAsText(file);
};

$("editor").addEventListener("input", () => { refreshHighlight(); debouncedSave(); });
$("editor").addEventListener("scroll", syncScroll);
$("editor").addEventListener("keydown", (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") { e.preventDefault(); runCode(); }
  if (e.key === "Tab") {  // Tab 输入 4 个空格而不是跳出输入框
    e.preventDefault();
    const t = e.target, s = t.selectionStart;
    t.value = t.value.slice(0, s) + "    " + t.value.slice(t.selectionEnd);
    t.selectionStart = t.selectionEnd = s + 4;
    refreshHighlight();
    debouncedSave();
  }
});

initTheme();
buildSidebar();
// 回到上次学习的章节(而不是每次都从第 1 章开始)
const lastChapter = localStorage.getItem("lastChapter");
const startDir = CHAPTERS.some((c) => c.dir === lastChapter) ? lastChapter : CHAPTERS[0].dir;
selectChapter(startDir);
updateCoinCount();
seriaSay("greet");
initPyodide().catch((e) => { $("status").textContent = "环境加载失败: " + e; });
</script>
